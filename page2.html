<!DOCTYPE html>
<html lang="en">

<head>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat&family=Open+Sans&display=swap" rel="stylesheet">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles/styles.css">
    <title>Meal Guide</title>
</head>
<body>
    <div id="wrapper">
        <header>
            <img src="images/rust_logo.png" alt="NutriGuide Logo">
            
            <ul id="navigation_bar">
                <li><a href="index.html">Home</a></li>
                <li><a href="page1.html">Nutrition Labels</a></li>
                <li><a href="page2.html">Meal Guide</a></li>
            </ul>

        </header>
    </div>    
    <main id="main_page2">
        <section class="meal-section">
            <h3>Good Meal Choices</h3>
            <div class="chart-container">
                <div class ="pie-chart"></div>
                <div class="chart-legend">
                    <div class="legend-item">
                        <span class="legend-color" style="background: #4CAF50;"></span>
                        Fruits &amp; Vegetables (50%)
                    </div>
                    <div class="legend-item">
                        <span class="legend-color" style="background: #E53935;"></span>
                        Lean Proteins (25%)
                    </div>
                    <div class="legend-item">
                        <span class="legend-color" style="background: #F9A825;"></span>
                        Whole Grains (25%)
                    </div>
                </div>
            </div>
        </section>
        <section class="smart_section">
            <h3>Smart Swaps</h3>
            <div class="swaps-row">
                <div class="swap-box">
                    <p>White Bread</p>
                    <p>→ Whole Grain Bread</p>
                </div>
                <div class="swap-box">
                    <p>Plain Yogurt</p>
                    <p>→ Plain + Fruit</p>
                </div>
                <div class="swap-box">
                    <p>Chips</p>
                    <p>→ Nuts or Seeds</p>
                </div>
            </div>
        </section>
    </main>
